  <text x="250" y="500" font-family="Arial, sans-serif" font-size="20" font-weight="700" fill="white" text-anchor="middle">1</text>
  <text x="295" y="485" font-family="Georgia, serif" font-size="20" font-weight="700" fill="#1a1a2e">Socks Keep Falling Off</text>
  <text x="295" y="515" font-family="Arial, sans-serif" font-size="15" fill="#1a1a2e" opacity="0.6">Elastic ankle grips keep baby socks securely in place.</text>
  <rect x="200" y="560" width="680" height="90" rx="20" fill="#FDF6F0"/>
  <rect x="200" y="560" width="680" height="90" rx="20" fill="none" stroke="#E8A0B4" stroke-width="1" opacity="0.3"/>
  <circle cx="250" cy="605" r="18" fill="#E8A0B4"/>
  <text x="250" y="610" font-family="Arial, sans-serif" font-size="20" font-weight="700" fill="white" text-anchor="middle">2</text>
  <text x="295" y="595" font-family="Georgia, serif" font-size="20" font-weight="700" fill="#1a1a2e">Tight Red Marks on Ankles</text>
  <text x="295" y="625" font-family="Arial, sans-serif" font-size="15" fill="#1a1a2e" opacity="0.6">Our ultra-soft fabric leaves zero marks on delicate skin.</text>
  <rect x="200" y="670" width="680" height="90" rx="20" fill="#FDF6F0"/>
  <rect x="200" y="670" width="680" height="90" rx="20" fill="none" stroke="#E8A0B4" stroke-width="1" opacity="0.3"/>
