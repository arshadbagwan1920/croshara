  <text x="380" y="71" font-family="Arial, sans-serif" font-size="14" fill="#E8A0B4" letter-spacing="1">MOM TIPS</text>
  <rect x="80" y="90" width="60" height="3" rx="1.5" fill="#E8A0B4"/>
