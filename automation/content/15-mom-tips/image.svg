  <text x="295" y="705" font-family="Georgia, serif" font-size="20" font-weight="700" fill="#1a1a2e">Crawling Frustration</text>
  <text x="295" y="735" font-family="Arial, sans-serif" font-size="15" fill="#1a1a2e" opacity="0.6">Non-slip soles give little ones the grip they need to explore.</text>
