      <stop offset="0%" stop-color="#E8A0B4"/>
      <stop offset="100%" stop-color="#D4849A"/>
    </linearGradient>
    <filter id="cardShadow">
      <feDropShadow dx="0" dy="6" stdDeviation="12" flood-color="#1a1a2e" flood-opacity="0.08"/>
