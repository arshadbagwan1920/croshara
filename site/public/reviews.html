<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reviews – CROSHARA Baby Shoes</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Inter', sans-serif;
      background: #FDF6F0;
      color: #1a1a2e;
      min-height: 100vh;
      padding: 40px 20px;
    }
    .container { max-width: 880px; margin: 0 auto; }
    h1 {
      font-family: 'Playfair Display', serif;
      font-size: 2.8rem;
      font-weight: 600;
      color: #1a1a2e;
      text-align: center;
      margin-bottom: 8px;
    }
    .subtitle {
      text-align: center;
      font-size: 1.05rem;
      color: #666;
      font-weight: 300;
      margin-bottom: 48px;
    }
    .subtitle em { color: #E8A0B4; font-style: normal; font-weight: 500; }
    .section-title {
      font-family: 'Playfair Display', serif;
      font-size: 1.6rem;
      font-weight: 500;
      color: #1a1a2e;
      margin-bottom: 24px;
      position: relative;
    }
    .section-title::after {
      content: '';
      display: block;
      width: 50px;
      height: 3px;
      background: #E8A0B4;
      border-radius: 4px;
      margin-top: 8px;
    }

    /* –– REVIEWS GRID –– */
    .reviews-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 24px;
      margin-bottom: 64px;
    }
    .review-card {
      background: #fff;
      border-radius: 20px;
      padding: 28px 26px;
      box-shadow: 0 4px 20px rgba(26,26,46,0.06);
      transition: transform 0.3s ease, box-shadow 0.3s ease;
    }
    .review-card:hover {
      transform: translateY(-3px);
      box-shadow: 0 10px 32px rgba(26,26,46,0.10);
    }
    .review-header {
      display: flex;
      align-items: center;
      gap: 14px;
      margin-bottom: 14px;
    }
    .avatar {
      width: 48px;
      height: 48px;
      border-radius: 50%;
      background: linear-gradient(135deg, #E8A0B4, #D4809A);
      display: flex;
      align-items: center;
      justify-content: center;
      color: #fff;
      font-weight: 600;
      font-size: 1.1rem;
      flex-shrink: 0;
    }
    .reviewer-info { flex: 1; }
    .reviewer-name {
      font-weight: 600;
      font-size: 1rem;
      color: #1a1a2e;
    }
    .reviewer-city {
      font-size: 0.82rem;
      color: #999;
      margin-top: 2px;
    }
    .stars {
      display: flex;
      gap: 3px;
      margin-bottom: 10px;
    }
    .star {
      color: #e6c300;
      font-size: 1.05rem;
    }
    .review-text {
      font-size: 0.92rem;
      line-height: 1.65;
      color: #444;
    }

    /* –– SUBMIT FORM –– */
    .form-card {
      background: #fff;
      border-radius: 20px;
      padding: 36px 40px;
      box-shadow: 0 4px 20px rgba(26,26,46,0.06);
      margin-bottom: 40px;
    }
    .form-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
      margin-bottom: 20px;
    }
    .form-group { margin-bottom: 20px; }
    .form-group label {
      display: block;
      font-size: 0.85rem;
      font-weight: 500;
      color: #555;
      margin-bottom: 6px;
    }
    .form-group input,
    .form-group textarea {
      width: 100%;
      padding: 12px 16px;
      border: 1.5px solid #eee;
      border-radius: 12px;
      font-family: 'Inter', sans-serif;
      font-size: 0.95rem;
      background: #FDF6F0;
      transition: border 0.3s;
      outline: none;
    }
    .form-group input:focus,
    .form-group textarea:focus {
      border-color: #E8A0B4;
    }
    .form-group textarea {
      min-height: 110px;
      resize: vertical;
    }

    .star-rating {
      display: flex;
      gap: 6px;
      margin: 8px 0 4px;
      font-size: 1.6rem;
      cursor: pointer;
    }
    .star-rating .star {
      color: #ddd;
      transition: color 0.2s;
      user-select: none;
    }
    .star-rating .star.active { color: #e6c300; }
    .star-rating .star:hover { color: #f0d050; }

    .btn-submit {
      background: linear-gradient(135deg, #E8A0B4, #D4809A);
      color: #fff;
      border: none;
      padding: 14px 40px;
      border-radius: 50px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s;
      font-family: 'Inter', sans-serif;
    }
    .btn-submit:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 24px rgba(232,160,180,0.4);
    }

    .toast {
      display: none;
      margin-top: 16px;
      padding: 14px 20px;
      border-radius: 12px;
      background: #e6f7e6;
      color: #1f7a1f;
      font-size: 0.9rem;
      font-weight: 500;
    }

    @media (max-width: 640px) {
      h1 { font-size: 2rem; }
      .reviews-grid { grid-template-columns: 1fr; }
      .form-card { padding: 24px 20px; }
      .form-row { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>What Parents Are Saying</h1>
    <p class="subtitle">Real reviews from real families who <em>love</em> CROSHARA booties</p>

    <!-- REVIEWS -->
    <div class="reviews-grid" id="reviewsGrid"></div>

    <!-- SUBMIT A REVIEW -->
    <h2 class="section-title">Share Your Experience</h2>
    <div class="form-card">
      <form id="reviewForm">
        <div class="form-row">
          <div class="form-group">
            <label for="reviewName">Your Name</label>
            <input type="text" id="reviewName" placeholder="e.g. Sarah Johnson" required>
          </div>
          <div class="form-group">
            <label for="reviewEmail">Email (not published)</label>
            <input type="email" id="reviewEmail" placeholder="you@example.com" required>
          </div>
        </div>
        <div class="form-group">
          <label>Your Rating</label>
          <div class="star-rating" id="starRating">
            <span class="star" data-value="1">★</span>
            <span class="star" data-value="2">★</span>
            <span class="star" data-value="3">★</span>
            <span class="star" data-value="4">★</span>
            <span class="star" data-value="5">★</span>
          </div>
        </div>
        <div class="form-group">
          <label for="reviewText">Your Review</label>
          <textarea id="reviewText" placeholder="Tell us about your experience with CROSHARA booties..." required></textarea>
        </div>
        <button type="submit" class="btn-submit">Submit Review</button>
        <div class="toast" id="toast">Thank you! Your review has been submitted.</div>
      </form>
    </div>
  </div>

  <!-- FLOATING DM BUTTON -->
  <a href="https://www.instagram.com/crosharahandmade" target="_blank" rel="noopener" class="float-dm" style="position:fixed;bottom:24px;right:24px;z-index:9999;display:flex;align-items:center;gap:10px;background:linear-gradient(135deg,#E8A0B4,#D4809A);color:#fff;padding:14px 24px;border-radius:50px;text-decoration:none;font-weight:600;font-size:0.95rem;box-shadow:0 8px 32px rgba(232,160,180,0.4);transition:all 0.4s ease;animation:float-dm 3s ease-in-out infinite;">
    <span style="font-size:1.4rem">📩</span>
    <span>DM to Order</span>
  </a>
  <style>@keyframes float-dm{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}.float-dm:hover{transform:translateY(-4px) scale(1.05);box-shadow:0 12px 40px rgba(232,160,180,0.5)}@media(max-width:576px){.float-dm span:last-child{display:none}}</style>

  <script>
    const sampleReviews = [
      { name: 'Sarah Johnson', city: 'Portland, OR', text: 'These booties are incredibly soft — my 8-month-old has been wearing them everywhere. The quality is unmatched and they make the perfect baby shower gift!' },
      { name: 'Emily Chen', city: 'San Francisco, CA', text: 'I bought a pair for my niece and they were an absolute hit. The craftsmanship is beautiful and the material keeps her little feet so warm. Already ordering another set!' },
      { name: 'Jessica Martinez', city: 'Austin, TX', text: 'We received so many compliments at our baby shower. The blush pink color is even lovelier in person. Super easy to put on and they stay on, which is a miracle with babies!' },
      { name: 'Amanda Williams', city: 'Chicago, IL', text: 'My baby has sensitive skin and these booties are the only ones that don\'t irritate her. So gentle, breathable, and the elastic ankle keeps them secure. Five stars isn\'t enough!' },
      { name: 'Lauren Thompson', city: 'Nashville, TN', text: 'I\'ve bought three pairs now — one for each of my sister\'s kids. They wear like iron and wash beautifully. The neutral colors go with everything. CROSHARA has a customer for life!' },
      { name: 'Rachel Patel', city: 'Denver, CO', text: 'The moment I opened the package I could feel the quality. These booties are buttery soft, the stitching is perfect, and my little one looks absolutely adorable in them. Thank you!' }
    ];

    function getInitials(name) {
      return name.split(' ').map(w => w[0]).join('').toUpperCase();
    }

    function renderStars(count) {
      return Array.from({ length: 5 }, (_, i) =>
        `<span class="star">${i < count ? '★' : '☆'}</span>`
      ).join('');
    }

    function renderReviews(reviews) {
      const grid = document.getElementById('reviewsGrid');
      grid.innerHTML = reviews.map(r => `
        <div class="review-card">
          <div class="review-header">
            <div class="avatar">${getInitials(r.name)}</div>
            <div class="reviewer-info">
              <div class="reviewer-name">${r.name}</div>
              <div class="reviewer-city">${r.city}</div>
            </div>
          </div>
          <div class="stars">${renderStars(5)}</div>
          <p class="review-text">"${r.text}"</p>
        </div>
      `).join('');
    }

    renderReviews(sampleReviews);

    // Star rating interaction
    const starContainer = document.getElementById('starRating');
    const starSpans = starContainer.querySelectorAll('.star');
    let selectedRating = 0;

    starSpans.forEach(s => {
      s.addEventListener('click', () => {
        selectedRating = parseInt(s.dataset.value);
        starSpans.forEach((st, i) => st.classList.toggle('active', i < selectedRating));
      });
      s.addEventListener('mouseenter', () => {
        const v = parseInt(s.dataset.value);
        starSpans.forEach((st, i) => st.style.color = i < v ? '#e6c300' : '#ddd');
      });
      s.addEventListener('mouseleave', () => {
        starSpans.forEach((st, i) => st.style.color = i < selectedRating ? '#e6c300' : '#ddd');
      });
    });

    // Form submission
    document.getElementById('reviewForm').addEventListener('submit', function(e) {
      e.preventDefault();
      if (selectedRating === 0) { alert('Please select a rating.'); return; }
      const name = document.getElementById('reviewName').value.trim();
      const text = document.getElementById('reviewText').value.trim();
      if (!name || !text) return;
      sampleReviews.unshift({ name, city: 'Verified Buyer', text });
      renderReviews(sampleReviews);
      this.reset();
      selectedRating = 0;
      starSpans.forEach(st => st.classList.remove('active'));
      const toast = document.getElementById('toast');
      toast.style.display = 'block';
      setTimeout(() => toast.style.display = 'none', 3500);
    });
  </script>
</body>
</html>
