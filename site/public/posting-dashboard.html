<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--cream:#FDF6F0;--pink:#E8A0B4;--pink-dark:#D4809A;--navy:#1a1a2e;--white:#fff;--text:#2d2d3a;--text-light:#6b6b80;--shadow:0 4px 24px rgba(26,26,46,0.06);--radius:16px}
body{font-family:'Inter',sans-serif;background:#f8f4f0;color:var(--text);padding:20px;max-width:600px;margin:0 auto}
.header{text-align:center;padding:24px 0 20px}
.header h1{font-family:'Playfair Display',serif;font-size:1.6rem;color:var(--navy)}
.header h1 span{color:var(--pink)}
.header p{font-size:0.85rem;color:var(--text-light);margin-top:4px}
.progress-wrap{background:var(--white);border-radius:var(--radius);padding:16px 20px;margin-bottom:16px;box-shadow:var(--shadow)}
.progress-bar{height:8px;background:var(--cream);border-radius:50px;overflow:hidden;margin-top:8px}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--pink),var(--pink-dark));border-radius:50px;transition:width 0.5s}
.today-card{background:linear-gradient(135deg,var(--pink),var(--pink-dark));color:var(--white);border-radius:var(--radius);padding:24px;margin-bottom:16px;box-shadow:0 8px 32px rgba(232,160,180,0.3)}
.today-card .label{font-size:0.75rem;text-transform:uppercase;letter-spacing:1px;opacity:0.8;margin-bottom:4px}
.today-card h2{font-family:'Playfair Display',serif;font-size:1.3rem;margin-bottom:4px}
.today-card .day-num{font-size:0.85rem;opacity:0.8}
.caption-box{background:rgba(255,255,255,0.15);border-radius:12px;padding:16px;margin:16px 0;font-size:0.85rem;line-height:1.6;white-space:pre-wrap;max-height:200px;overflow-y:auto}
.btn{display:block;width:100%;padding:14px;border-radius:50px;border:none;font-weight:600;font-size:0.95rem;cursor:pointer;transition:all 0.3s;text-align:center;text-decoration:none;margin-bottom:8px}
.btn-primary{background:var(--navy);color:var(--white)}
.btn-primary:hover{transform:translateY(-2px);box-shadow:0 8px 24px rgba(26,26,46,0.2)}
.btn-secondary{background:var(--white);color:var(--navy)}
.btn-secondary:hover{transform:translateY(-2px)}
.btn-success{background:#22c55e;color:var(--white)}
.checklist{background:var(--white);border-radius:var(--radius);padding:20px;margin-bottom:16px;box-shadow:var(--shadow)}
.checklist h3{font-size:1rem;margin-bottom:12px;color:var(--navy)}
.check-item{display:flex;align-items:center;gap:12px;padding:10px 0;border-bottom:1px solid rgba(0,0,0,0.04);font-size:0.9rem}
.check-item:last-child{border-bottom:none}
.check-item input[type="checkbox"]{width:20px;height:20px;accent-color:var(--pink);cursor:pointer}
.check-item label{cursor:pointer;flex:1}
.check-item.done label{text-decoration:line-through;color:var(--text-light)}
.calendar{background:var(--white);border-radius:var(--radius);padding:20px;box-shadow:var(--shadow)}
.calendar h3{font-size:1rem;margin-bottom:12px;color:var(--navy)}
.cal-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:6px}
.cal-day{padding:8px 4px;text-align:center;border-radius:8px;font-size:0.75rem;background:var(--cream);cursor:pointer;transition:all 0.3s}
.cal-day .num{font-weight:600;font-size:0.85rem}
.cal-day.done{background:rgba(34,197,94,0.15);color:#16a34a}
.cal-day.today{background:var(--pink);color:var(--white);transform:scale(1.1)}
.actions{margin-top:16px;display:flex;gap:8px}
.actions .btn{flex:1;font-size:0.85rem;padding:12px}
@media(max-width:480px){.cal-grid{grid-template-columns:repeat(5,1fr);gap:4px}.cal-day{padding:6px 2px;font-size:0.7rem}}
</style>

let doneDays = JSON.parse(localStorage.getItem('croshara_done') || '[]');
const today = new Date();
const startDate = new Date(2026, 6, 1);
const daysSince = Math.floor((today - startDate) / 86400000);
const currentDayIndex = Math.min(Math.max(daysSince % 30, 0), 29);
const currentDay = contentDays[currentDayIndex];

function render() {
  renderCalendar();
  renderToday();
  renderProgress();
  renderChecklist();
}

function renderToday() {
  const d = currentDay;
  document.getElementById('todayTitle').textContent = d.title;
  document.getElementById('todayFolder').textContent = Day ${d.day}  ${d.folder}/;
  document.getElementById('todayCaption').textContent = fullCaptions[d.folder] || 'Caption not found';
  const card = document.getElementById('todayCard');
  if (doneDays.includes(d.folder)) {
    card.style.background = 'linear-gradient(135deg,#22c55e,#16a34a)';
    document.querySelector('.today-card .label').textContent = 'Posted';
  } else {
    card.style.background = 'linear-gradient(135deg,var(--pink),var(--pink-dark))';
    document.querySelector('.today-card .label').textContent = "Today's Post";
  }
}

function renderCalendar() {
  const grid = document.getElementById('calGrid');
  grid.innerHTML = contentDays.map(d => `
    <div class="cal-day${doneDays.includes(d.folder)?' done':''}${d.folder===currentDay.folder?' today':''}" onclick="jumpTo('${d.folder}')">
      <div class="num">${d.day}</div>
      ${d.title.slice(0,10)}
    </div>
  `).join('');
}

function renderProgress() {
  const pct = Math.round((doneDays.length/30)*100);
  document.getElementById('progressText').textContent = ${doneDays.length} / 30 days done;
  document.getElementById('progressPct').textContent = ${pct}%;
  document.getElementById('progressFill').style.width = pct+'%';
}

function renderChecklist() {
  const checks = JSON.parse(localStorage.getItem('croshara_checks') || '{}');
  const key = currentDay.folder;
  for(let i=1;i<=6;i++) {
    const el = document.getElementById('chk'+i);
    if(el) {
      el.checked = checks[key+'_chk'+i] || false;
      document.getElementById('c'+i).className = 'check-item'+(el.checked?' done':'');
    }
  }
}

document.addEventListener('change', function(e) {
  if(e.target.id?.startsWith('chk')) {
    const checks = JSON.parse(localStorage.getItem('croshara_checks') || '{}');
    checks[currentDay.folder+'_'+e.target.id] = e.target.checked;
    localStorage.setItem('croshara_checks', JSON.stringify(checks));
    document.getElementById('c'+e.target.id.slice(3)).className = 'check-item'+(e.target.checked?' done':'');
  }
});

function copyCaption() {
  const text = fullCaptions[currentDay.folder] || '';
  navigator.clipboard.writeText(text).then(() => {
    const btn = document.querySelector('.today-card .btn-secondary');
    btn.textContent = 'Copied!';
    setTimeout(()=>btn.textContent='Copy Caption',2000);
  });
}

function markTodayDone() {
  if(!doneDays.includes(currentDay.folder)) {
    doneDays.push(currentDay.folder);
    localStorage.setItem('croshara_done', JSON.stringify(doneDays));
    render();
  }
}

function jumpTo(folder) {
  localStorage.setItem('croshara_jump', folder);
  window.location.reload();
}

function resetAll() {
  if(confirm('Reset all progress?')) {
    localStorage.removeItem('croshara_done');
    localStorage.removeItem('croshara_checks');
    doneDays = [];
    render();
  }
}

function downloadImage() {
  window.open(https://github.com/arshadbagwan1920/croshara/tree/main/automation/content/${currentDay.folder}, '_blank');
}

render();
</script>
</body>
</html>
